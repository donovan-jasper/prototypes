<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceForge - Visual Voice AI Platform</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>VoiceForge</h1>
            <nav>
                <button id="new-workflow-btn">New Workflow</button>
                <button id="save-workflow-btn">Save Workflow</button>
                <button id="settings-btn">Providers</button>
            </nav>
        </header>

        <div class="main-container">
            <aside class="sidebar">
                <h2>Workflows</h2>
                <ul id="workflow-list">
                    <!-- Workflows will be loaded here -->
                </ul>
            </aside>

            <main class="content-area">
                <div class="tabs">
                    <button class="tab-button active" data-tab="canvas-editor">Editor</button>
                    <button class="tab-button" data-tab="voice-test">Voice Test</button>
                </div>

                <div id="canvas-editor" class="tab-content active">
                    <div class="canvas-toolbar">
                        <div class="node-palette">
                            <div class="node-item" data-node-type="start">Start</div>
                            <div class="node-item" data-node-type="stt">STT</div>
                            <div class="node-item" data-node-type="llm">LLM</div>
                            <div class="node-item" data-node-type="tts">TTS</div>
                            <div class="node-item" data-node-type="branch">Branch</div>
                            <div class="node-item" data-node-type="end">End</div>
                        </div>
                        <div class="canvas-controls">
                            <button id="zoom-in-btn">+</button>
                            <button id="zoom-out-btn">-</button>
                            <button id="reset-view-btn">Reset</button>
                        </div>
                    </div>
                    <canvas id="workflow-canvas"></canvas>
                </div>

                <div id="voice-test" class="tab-content">
                    <h2>Voice Test</h2>
                    <div class="voice-controls">
                        <label for="test-workflow-select">Select Workflow:</label>
                        <select id="test-workflow-select"></select>
                        <button id="record-btn">Record</button>
                        <div id="audio-waveform"></div>
                        <p id="voice-status">Idle</p>
                    </div>
                    <div class="voice-output">
                        <h3>Transcript:</h3>
                        <div id="transcript-output" class="chat-bubble user"></div>
                        <h3>LLM Response:</h3>
                        <div id="llm-response-output" class="chat-bubble assistant"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modals -->
    <div id="workflow-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>New Workflow</h2>
            <label for="workflow-name">Workflow Name:</label>
            <input type="text" id="workflow-name" required>
            <button id="create-workflow-submit">Create</button>
        </div>
    </div>

    <div id="node-config-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 id="node-config-title">Configure Node</h2>
            <div id="node-config-form">
                <!-- Dynamic form fields based on node type -->
            </div>
            <button id="save-node-config-btn">Save Config</button>
        </div>
    </div>

    <div id="provider-config-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>AI Provider Configuration</h2>
            <div class="provider-config-item">
                <h3>OpenAI</h3>
                <label for="openai-api-key">API Key:</label>
                <input type="password" id="openai-api-key" placeholder="sk-..." autocomplete="off">
                <button data-provider="openai" class="save-provider-btn">Save OpenAI Config</button>
            </div>
            <div class="provider-config-item">
                <h3>Anthropic</h3>
                <label for="anthropic-api-key">API Key:</label>
                <input type="password" id="anthropic-api-key" placeholder="sk-ant-..." autocomplete="off">
                <button data-provider="anthropic" class="save-provider-btn">Save Anthropic Config</button>
            </div>
            <div id="provider-status"></div>
        </div>
    </div>

    <script type="module" src="/js/api.js"></script>
    <script type="module" src="/js/nodes.js"></script>
    <script type="module" src="/js/canvas.js"></script>
    <script type="module" src="/js/voice.js"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
