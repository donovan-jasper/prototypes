<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentHub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>AgentHub</h1>
    <div class="session-selector">
      <select id="session-dropdown"></select>
      <button id="new-session-btn">New Session</button>
    </div>
  </header>

  <div class="container">
    <div class="sidebar file-browser">
      <h2>Files</h2>
      <div id="file-tree"></div>
    </div>

    <div class="main-content">
      <div class="terminal">
        <div class="terminal-output" id="terminal-output"></div>
        <div class="terminal-input">
          <input type="text" id="terminal-input" placeholder="Type a message or command...">
        </div>
      </div>
    </div>

    <div class="sidebar file-editor">
      <div class="editor-header">
        <h2>Editor</h2>
        <button id="save-file-btn">Save</button>
      </div>
      <div class="editor-content">
        <textarea id="file-editor" spellcheck="false"></textarea>
      </div>
    </div>
  </div>

  <div class="modal" id="new-session-modal">
    <div class="modal-content">
      <h2>New Session</h2>
      <div class="form-group">
        <label for="session-name">Session Name:</label>
        <input type="text" id="session-name" required>
      </div>
      <div class="form-group">
        <label for="agent-type">Agent Type:</label>
        <select id="agent-type" required>
          <option value="claude">Claude</option>
          <option value="codex">Codex</option>
          <option value="gemini">Gemini</option>
        </select>
      </div>
      <div class="modal-actions">
        <button id="create-session-btn">Create</button>
        <button id="cancel-session-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/languages/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/languages/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/languages/html.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/languages/css.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/app.js"></script>
  <script src="js/sessions.js"></script>
  <script src="js/terminal.js"></script>
  <script src="js/editor.js"></script>
</body>
</html>
