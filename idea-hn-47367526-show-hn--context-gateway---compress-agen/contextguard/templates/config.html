<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContextGuard - Configuration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="container">
            <div id="branding">
                <h1>ContextGuard</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="/">Home</a></li>
                    <li class="current"><a href="/config">Configuration</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="container">
        <h2>Configuration</h2>
        <form id="config-form">
            <div class="box">
                <label for="model">Model:</label>
                <input type="text" id="model" name="model" value="{{ config.model }}">
            </div>
            <div class="box">
                <label for="compression_ratio">Compression Ratio:</label>
                <input type="text" id="compression_ratio" name="compression_ratio" value="{{ config.compression_ratio }}">
            </div>
            <button type="submit">Save</button>
        </form>
    </section>

    <footer>
        <p>ContextGuard, Copyright &copy; 2023</p>
    </footer>

    <script>
        document.getElementById('config-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            fetch('/config', {
                method: 'POST',
                body: formData,
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    alert('Configuration saved successfully!');
                }
            });
        });
    </script>
</body>
</html>
