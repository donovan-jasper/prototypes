<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContextGuard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="container">
            <div id="branding">
                <h1>ContextGuard</h1>
            </div>
            <nav>
                <ul>
                    <li class="current"><a href="/">Home</a></li>
                    <li><a href="/config">Configuration</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="container">
        <h2>Tool Output</h2>
        <textarea id="tool-output" rows="10" cols="50"></textarea>
        <button id="compress-btn">Compress</button>

        <h2>Compressed Content</h2>
        <div id="compressed-content"></div>

        <h2>Expanded Content</h2>
        <div id="expanded-content"></div>
        <button id="expand-btn">Expand</button>
    </section>

    <footer>
        <p>ContextGuard, Copyright &copy; 2023</p>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
