<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA - Admin Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎙️ AVA Dashboard</h1>
            <div id="status" class="status"></div>
        </header>

        <section class="config-section">
            <h2>Configuration</h2>
            <div class="config-form">
                <label for="systemPrompt">System Prompt:</label>
                <textarea id="systemPrompt" rows="4"></textarea>
                <button onclick="saveConfig()">Save Configuration</button>
            </div>
            <div class="config-info">
                <p><strong>STT Provider:</strong> <span id="sttProvider"></span></p>
                <p><strong>LLM Provider:</strong> <span id="llmProvider"></span> (<span id="llmModel"></span>)</p>
                <p><strong>TTS Provider:</strong> <span id="ttsProvider"></span></p>
            </div>
        </section>

        <section class="calls-section">
            <h2>Recent Calls</h2>
            <table id="callsTable">
                <thead>
                    <tr>
                        <th>Call ID</th>
                        <th>Caller</th>
                        <th>Start Time</th>
                        <th>Duration</th>
                        <th>Status</th>
                        <th>Transcript</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
