<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalForge</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="#" data-tool="media">Media</a></li>
        <li><a href="#" data-tool="image">Image</a></li>
        <li><a href="#" data-tool="pdf">PDF</a></li>
        <li><a href="#" data-tool="document">Document</a></li>
        <li><a href="#" data-tool="archive">Archive</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <div id="dropZone" class="drop-zone">
      <p>Drag & drop files here or click to browse</p>
      <input type="file" id="fileInput" multiple style="display: none;">
    </div>
    <div id="fileList" class="file-list"></div>
    <div id="conversion-options">
      <div class="format-selector-container">
        <label for="formatSelector">Target Format:</label>
        <select id="formatSelector">
          <option value="">Select format...</option>
        </select>
      </div>
      <div id="qualityOptions" class="quality-options"></div>
    </div>
    <button id="convertButton">Convert</button>
    <a id="downloadButton" style="display: none;">Download</a>
    <div id="progress" style="width: 0%;"></div>
    <div id="error"></div>
    <div id="success"></div>
  </main>
  <script type="module" src="js/app.js"></script>
</body>
</html>
